# Storefront — shop.cartunez.in
server {
    listen 80;
    listen [::]:80;
    server_name shop.cartunez.in;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://shop.cartunez.in$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name shop.cartunez.in;

    ssl_certificate     /etc/letsencrypt/live/cartunez.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cartunez.in/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/cartunez.in/chain.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://commerce.cartunez.in https://api.cartunez.in https://search.cartunez.in; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self';" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Logging
    access_log /var/log/nginx/shop_access.log;
    error_log  /var/log/nginx/shop_error.log warn;

    client_max_body_size 50M;

    # Static files - Next.js Storefront
    location /_next/static/ {
        proxy_pass http://localhost:3001;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Public assets
    location /public/ {
        proxy_pass http://localhost:3001;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Images
    location ~* \.(jpg|jpeg|png|gif|ico|webp|avif|tiff)$ {
        proxy_pass http://localhost:3001;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Fonts
    location ~* \.(woff|woff2|ttf|otf|eot)$ {
        proxy_pass http://localhost:3001;
        expires 365d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
    }

    # JavaScript and CSS
    location ~* \.(js|css)$ {
        proxy_pass http://localhost:3001;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Favicon
    location = /favicon.ico {
        proxy_pass http://localhost:3001;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
        log_not_found off;
    }

    # Robots.txt
    location = /robots.txt {
        proxy_pass http://localhost:3001;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # Sitemap
    location = /sitemap.xml {
        proxy_pass http://localhost:3001;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    location = /sitemap-*.xml {
        proxy_pass http://localhost:3001;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # API routes
    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_cache_valid 200 5m;
        add_header Cache-Control "public, max-age=300, s-maxage=300";
    }

    # Next.js data routes
    location /_next/data/ {
        proxy_pass http://localhost:3001;
        proxy_cache_valid 200 5m;
        add_header Cache-Control "public, max-age=300, s-maxage=300";
    }

    # Cart and checkout
    location ~ ^/(cart|checkout|account)/ {
        proxy_pass http://localhost:3001;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Default proxy
    location / {
        proxy_pass http://localhost:3001;
        proxy_cache_valid 200 5m;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Error pages
    error_page 404 /404.html;
    location = /404.html {
        proxy_pass http://localhost:3001;
        internal;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        proxy_pass http://localhost:3001;
        internal;
    }
}

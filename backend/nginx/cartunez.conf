# ─── Cartunez.in — System-level Nginx Config ────────────────────────────────────
# Install: sudo cp cartunez.conf /etc/nginx/sites-available/cartunez
# Enable:  sudo ln -sf /etc/nginx/sites-available/cartunez /etc/nginx/sites-enabled/cartunez
# SSL:     sudo certbot --nginx -d cartunez.in -d www.cartunez.in
# Reload:  sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS redirect (uncomment after SSL cert is generated)
# server {
#     listen 80;
#     server_name cartunez.in www.cartunez.in;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    # listen 443 ssl http2;  # Uncomment after SSL
    server_name cartunez.in www.cartunez.in;

    # ── SSL (uncomment after certbot) ──────────────────────────────────────
    # ssl_certificate     /etc/letsencrypt/live/cartunez.in/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/cartunez.in/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;

    # ── Frontend (Vite built output) ──────────────────────────────────────
    root /var/www/cartunez/dist;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache images
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── Medusa Store API (products, cart, checkout) ────────────────────────
    location /store/ {
        proxy_pass http://127.0.0.1:9000/store/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # ── Medusa Admin ──────────────────────────────────────────────────────
    location /admin/ {
        proxy_pass http://127.0.0.1:9000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Medusa Auth ───────────────────────────────────────────────────────
    location /auth/ {
        proxy_pass http://127.0.0.1:9000/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Medusa direct routes (health, etc) ────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:9000/health;
        proxy_set_header Host $host;
    }

    # ── FastAPI (vehicles, blogs, reviews, social, chatbot, etc) ──────────
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 30s;
    }

    # ── Meilisearch (only if exposed) ─────────────────────────────────────
    # Uncomment only if frontend queries Meilisearch directly
    # location /search/ {
    #     proxy_pass http://127.0.0.1:7700/;
    #     proxy_set_header Host $host;
    # }

    # ── SPA fallback — serve index.html for client-side routing ────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Block dotfiles ────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Uploads (product images) ──────────────────────────────────────────
    location /uploads/ {
        proxy_pass http://127.0.0.1:9000/uploads/;
        expires 30d;
        add_header Cache-Control "public";
    }
}

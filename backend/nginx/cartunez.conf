# ─── Cartunez.in — Main Site Nginx Config ──────────────────────────────────────
# Install: sudo cp cartunez.conf /etc/nginx/sites-available/cartunez
# Enable:  sudo ln -sf /etc/nginx/sites-available/cartunez /etc/nginx/sites-enabled/cartunez
# SSL:     sudo certbot --nginx -d cartunez.in -d www.cartunez.in
# Reload:  sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name cartunez.in www.cartunez.in;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cartunez.in www.cartunez.in;

    # SSL certificate
    ssl_certificate     /etc/letsencrypt/live/cartunez.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cartunez.in/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/cartunez.in/chain.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.cartunez.in; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # Frontend (Vite built output)
    root /var/www/cartunez/dist;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache images
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── Medusa Store API (products, cart, checkout) ────────────────────────
    location /store/ {
        proxy_pass http://127.0.0.1:9000/store/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # ── Medusa Admin ──────────────────────────────────────────────────────
    location /admin/ {
        proxy_pass http://127.0.0.1:9000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Medusa Auth ───────────────────────────────────────────────────────
    location /auth/ {
        proxy_pass http://127.0.0.1:9000/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Medusa direct routes (health, etc) ────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:9000/health;
        proxy_set_header Host $host;
    }

    # ── FastAPI (vehicles, blogs, reviews, social, chatbot, etc) ──────────
    location /api/ {
        proxy_pass http://127.0.0.1:8005/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 30s;
    }

    # ── SPA fallback — serve index.html for client-side routing ────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Block dotfiles ────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Uploads (product images) ──────────────────────────────────────────
    location /uploads/ {
        proxy_pass http://127.0.0.1:9000/uploads/;
        expires 30d;
        add_header Cache-Control "public";
    }
}

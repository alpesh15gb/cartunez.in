# FastAPI Backend  api.cartunez.in
server {
    listen 80;
    listen [::]:80;
    server_name api.cartunez.in;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://api.cartunez.in$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.cartunez.in;

    ssl_certificate     /etc/letsencrypt/live/cartunez.in-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cartunez.in-0001/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/cartunez.in-0001/chain.pem;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'none'; connect-src 'self'; frame-src 'none'; object-src 'none';" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # CORS is handled by FastAPI CORSMiddleware  do NOT add CORS headers here

    # Logging
    access_log /var/log/nginx/api_access.log;
    error_log  /var/log/nginx/api_error.log warn;

    client_max_body_size 50M;

    # Rate limiting

    # Health check (no rate limit)
    location = /health {
        proxy_pass http://127.0.0.1:8005;
        access_log off;
    }

    # OpenAPI docs
    location ~ ^/(docs|redoc|openapi.json)$ {
        proxy_pass http://127.0.0.1:8005;
    }

    # Authentication endpoints
    location ~ ^/api/v1/(auth|login|register|forgot-password|reset-password)/ {
        proxy_pass http://127.0.0.1:8005;
    }

    # Webhook endpoints
    location ~ ^/api/v1/webhooks/ {
        proxy_pass http://127.0.0.1:8005;
    }

    # Search endpoints
    location ~ ^/api/v1/search/ {
        proxy_pass http://127.0.0.1:8005;
    }

    # Cart and checkout
    location ~ ^/api/v1/(cart|checkout|orders)/ {
        proxy_pass http://127.0.0.1:8005;
    }

    # Static file uploads
    location /uploads/ {
        proxy_pass http://127.0.0.1:8005;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Default API proxy
    location / {
        proxy_pass http://127.0.0.1:8005;
        proxy_cache_valid 200 5m;
    }

    # Error pages
    error_page 429 /429.json;
    location = /429.json {
        internal;
        default_type application/json;
        return 429 '{"error":"rate_limit_exceeded","message":"Too many requests. Please try again later."}';
    }

    error_page 500 502 503 504 /50x.json;
    location = /50x.json {
        internal;
        default_type application/json;
        return 502 '{"error":"service_unavailable","message":"The service is temporarily unavailable."}';
    }
}


# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name api.cartunez.in;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://api.cartunez.in$request_uri;
    }
}

# FastAPI Backend
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.cartunez.in;

    # SSL certificate
    ssl_certificate     /etc/letsencrypt/live/cartunez.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cartunez.in/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/cartunez.in/chain.pem;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'none'; connect-src 'self'; frame-src 'none'; object-src 'none';" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # CORS headers
    add_header Access-Control-Allow-Origin "https://cartunez.in https://shop.cartunez.in" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Request-ID" always;
    add_header Access-Control-Expose-Headers "Content-Length,Content-Range,X-Request-ID" always;
    add_header Access-Control-Max-Age 1728000 always;

    # Logging
    access_log /var/log/nginx/api_access.log main;
    error_log  /var/log/nginx/api_error.log warn;

    # Max body size
    client_max_body_size 50M;

    # Rate limiting - general
    limit_req zone=api_general burst=50 nodelay;
    limit_req_status 429;

    # Health check (no rate limit)
    location = /health {
        proxy_pass http://localhost:8000;
        access_log off;
    }

    # OpenAPI docs (rate limited)
    location ~ ^/(docs|redoc|openapi.json)$ {
        limit_req zone=api_auth burst=5 nodelay;
        proxy_pass http://localhost:8000;
    }

    # Authentication endpoints (stricter rate limiting)
    location ~ ^/api/v1/(auth|login|register|forgot-password|reset-password)/ {
        limit_req zone=api_auth burst=5 nodelay;
        proxy_pass http://localhost:8000;
    }

    # Webhook endpoints (higher rate limit)
    location ~ ^/api/v1/webhooks/ {
        limit_req zone=api_webhook burst=100 nodelay;
        proxy_pass http://localhost:8000;
    }

    # Search endpoints
    location ~ ^/api/v1/search/ {
        limit_req zone=api_search burst=30 nodelay;
        proxy_pass http://localhost:8000;
    }

    # Cart and checkout
    location ~ ^/api/v1/(cart|checkout|orders)/ {
        limit_req zone=api_cart burst=20 nodelay;
        proxy_pass http://localhost:8000;
    }

    # Static file uploads
    location /uploads/ {
        proxy_pass http://localhost:8000;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Default API proxy
    location / {
        proxy_pass http://localhost:8000;
        proxy_cache_valid 200 5m;
    }

    # Handle OPTIONS preflight
    location @options {
        add_header Access-Control-Allow-Origin "https://cartunez.in https://shop.cartunez.in";
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Request-ID";
        add_header Access-Control-Max-Age 1728000;
        add_header Content-Length 0;
        return 204;
    }

    # Error pages
    error_page 429 /429.json;
    location = /429.json {
        internal;
        default_type application/json;
        return 429 '{"error":"rate_limit_exceeded","message":"Too many requests. Please try again later."}';
    }

    error_page 500 502 503 504 /50x.json;
    location = /50x.json {
        internal;
        default_type application/json;
        return 502 '{"error":"service_unavailable","message":"The service is temporarily unavailable."}';
    }
}

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name commerce.cartunez.in;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://commerce.cartunez.in$request_uri;
    }
}

# Medusa Commerce Backend
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name commerce.cartunez.in;

    # SSL certificate
    ssl_certificate     /etc/letsencrypt/live/cartunez.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cartunez.in/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/cartunez.in/chain.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss://commerce.cartunez.in ws://commerce.cartunez.in; object-src 'none'; base-uri 'self'; form-action 'self';" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # CORS headers
    add_header Access-Control-Allow-Origin "https://cartunez.in https://shop.cartunez.in" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Request-ID,x-medusa-access-token" always;
    add_header Access-Control-Expose-Headers "Content-Length,Content-Range,X-Request-ID" always;
    add_header Access-Control-Max-Age 1728000 always;

    # Logging
    access_log /var/log/nginx/commerce_access.log main;
    error_log  /var/log/nginx/commerce_error.log warn;

    # Max body size
    client_max_body_size 50M;

    # Rate limiting
    limit_req zone=api_general burst=50 nodelay;
    limit_req_status 429;

    # Health check
    location = /health {
        proxy_pass http://localhost:9000;
        access_log off;
    }

    # Admin panel (allow iframe for admin)
    location /admin/ {
        proxy_pass http://localhost:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Frame-Options "ALLOWALL" always;
    }

    # Admin WebSocket support
    location /admin/ws/ {
        proxy_pass http://localhost:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Store API routes
    location /store/ {
        limit_req zone=api_cart burst=30 nodelay;
        proxy_pass http://localhost:9000;
        proxy_cache_valid 200 1m;
        add_header Cache-Control "public, max-age=60, s-maxage=60";
    }

    # Admin API routes (strict authentication)
    location /admin/users/ {
        limit_req zone=api_auth burst=5 nodelay;
        proxy_pass http://localhost:9000;
    }

    location /admin/auth/ {
        limit_req zone=api_auth burst=5 nodelay;
        proxy_pass http://localhost:9000;
    }

    # Default admin API
    location /admin/ {
        proxy_pass http://localhost:9000;
        proxy_cache_valid 200 5m;
    }

    # Webhooks
    location ~ ^/webhooks/ {
        limit_req zone=api_webhook burst=100 nodelay;
        proxy_pass http://localhost:9000;
    }

    # Static file uploads
    location /uploads/ {
        proxy_pass http://localhost:9000;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Default proxy
    location / {
        proxy_pass http://localhost:9000;
        proxy_cache_valid 200 5m;
    }

    # Error pages
    error_page 429 /429.json;
    location = /429.json {
        internal;
        default_type application/json;
        return 429 '{"error":"rate_limit_exceeded","message":"Too many requests. Please try again later."}';
    }

    error_page 500 502 503 504 /50x.json;
    location = /50x.json {
        internal;
        default_type application/json;
        return 502 '{"error":"service_unavailable","message":"The service is temporarily unavailable."}';
    }
}

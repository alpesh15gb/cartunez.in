# Medusa Commerce Backend  commerce.cartunez.in
server {
    listen 80;
    listen [::]:80;
    server_name commerce.cartunez.in;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://commerce.cartunez.in$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name commerce.cartunez.in;

    ssl_certificate     /etc/letsencrypt/live/cartunez.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cartunez.in/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/cartunez.in/chain.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # CORS is handled by Medusa  do NOT add CORS headers here

    # Logging
    access_log /var/log/nginx/commerce_access.log;
    error_log  /var/log/nginx/commerce_error.log warn;

    client_max_body_size 50M;

    # Rate limiting

    # Health check
    location = /health {
        proxy_pass http://127.0.0.1:9000;
        access_log off;
    }

    # Admin panel
    location /admin/ {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin WebSocket support
    location /admin/ws/ {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Store API routes
    location /store/ {
        proxy_pass http://127.0.0.1:9000;
        proxy_cache_valid 200 1m;
        add_header Cache-Control "public, max-age=60, s-maxage=60";
    }

    # Admin API routes
    location /admin/users/ {
        proxy_pass http://127.0.0.1:9000;
    }

    location /admin/auth/ {
        proxy_pass http://127.0.0.1:9000;
    }

    # Webhooks
    location ~ ^/webhooks/ {
        proxy_pass http://127.0.0.1:9000;
    }

    # Static file uploads
    location /uploads/ {
        proxy_pass http://127.0.0.1:9000;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Default proxy
    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_cache_valid 200 5m;
    }

    # Error pages
    error_page 429 /429.json;
    location = /429.json {
        internal;
        default_type application/json;
        return 429 '{"error":"rate_limit_exceeded","message":"Too many requests. Please try again later."}';
    }

    error_page 500 502 503 504 /50x.json;
    location = /50x.json {
        internal;
        default_type application/json;
        return 502 '{"error":"service_unavailable","message":"The service is temporarily unavailable."}';
    }
}

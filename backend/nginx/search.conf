# Meilisearch - Internal Only
server {
    listen 80;
    listen [::]:80;
    server_name search.cartunez.in;

    # Block all external access
    allow 127.0.0.1;
    allow ::1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;

    location / {
        return 301 https://search.cartunez.in$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name search.cartunez.in;

    # SSL certificate
    ssl_certificate     /etc/letsencrypt/live/cartunez.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cartunez.in/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/cartunez.in/chain.pem;

    # Restrict to internal IPs only
    allow 127.0.0.1;
    allow ::1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'none';" always;

    # CORS - only allow internal services
    add_header Access-Control-Allow-Origin "https://cartunez.in https://shop.cartunez.in https://api.cartunez.in" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Meili-API-Key" always;
    add_header Access-Control-Max-Age 1728000 always;

    # Logging
    access_log /var/log/nginx/search_access.log main;
    error_log  /var/log/nginx/search_error.log warn;

    # Max body size
    client_max_body_size 50M;

    # Rate limiting
    limit_req zone=api_search burst=50 nodelay;
    limit_req_status 429;

    # Health check
    location = /health {
        proxy_pass http://localhost:7700;
        access_log off;
    }

    # Multi-search endpoint
    location = /multi-search {
        limit_req zone=api_search burst=20 nodelay;
        proxy_pass http://localhost:7700;
        proxy_cache_valid 200 5m;
    }

    # Index stats (read-only, cacheable)
    location ~ ^/indexes/[^/]+/stats$ {
        proxy_pass http://localhost:7700;
        proxy_cache_valid 200 1m;
        add_header Cache-Control "public, max-age=60";
    }

    # Index settings
    location ~ ^/indexes/[^/]+/settings$ {
        proxy_pass http://localhost:7700;
        proxy_cache_valid 200 30s;
    }

    # Search endpoints
    location ~ ^/indexes/[^/]+/search$ {
        limit_req zone=api_search burst=30 nodelay;
        proxy_pass http://localhost:7700;
        proxy_cache_valid 200 5m;
    }

    # Documents
    location ~ ^/indexes/[^/]+/documents$ {
        proxy_pass http://localhost:7700;
        proxy_cache_valid 200 5m;
    }

    # Default proxy
    location / {
        proxy_pass http://localhost:7700;
        proxy_cache_valid 200 5m;
    }

    # Error pages
    error_page 429 /429.json;
    location = /429.json {
        internal;
        default_type application/json;
        return 429 '{"message":"Rate limit exceeded. Please try again later."}';
    }

    error_page 500 502 503 504 /50x.json;
    location = /50x.json {
        internal;
        default_type application/json;
        return 502 '{"message":"Search service temporarily unavailable."}';
    }
}

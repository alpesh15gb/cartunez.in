networks:
  cartunez-network:
    name: cartunez-network
    driver: bridge

volumes:
  postgres_data:
    name: cartunez_postgres_data
  redis_data:
    name: cartunez_redis_data
  meilisearch_data:
    name: cartunez_meilisearch_data

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cartunez-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cartunez}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-cartunez}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cartunez-network
    deploy:
      resources:
        limits:
          memory: 1G
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: cartunez-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-cartunez_redis_2024}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-cartunez_redis_2024}", "ping"]
    networks:
      - cartunez-network
    deploy:
      resources:
        limits:
          memory: 1G
    logging: *default-logging

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${NEXT_PUBLIC_MEDUSA_BACKEND_URL:-https://cartunez.in}
        NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY:-pk_01KVBSWHFD53JWKRBEHS43FDBJ}
        NEXT_PUBLIC_DEFAULT_REGION: ${NEXT_PUBLIC_DEFAULT_REGION:-dk}
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-https://cartunez.in}
    container_name: cartunez-frontend
    restart: unless-stopped
    ports:
      - "3001:8000"
    environment:
      NODE_ENV: production
    depends_on:
      medusa:
        condition: service_healthy
      fastapi:
        condition: service_healthy
    networks:
      - cartunez-network
    deploy:
      resources:
        limits:
          memory: 512M
    logging: *default-logging

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: cartunez-meilisearch
    restart: unless-stopped
    environment:
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: true
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-meilisearch_master_key}
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7700/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - cartunez-network
    deploy:
      resources:
        limits:
          memory: 1G
    logging: *default-logging

  medusa:
    build:
      context: ./cartunez-medusa
      dockerfile: Dockerfile
    container_name: cartunez-medusa
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - ./uploads:/app/uploads
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-cartunez}
      REDIS_URL: redis://:${REDIS_PASSWORD:-cartunez_redis_2024}@redis:6379
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY:-}
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-change_me}
      COOKIE_SECRET: ${COOKIE_SECRET:-change_me}
      STORE_CORS: ${STORE_CORS:-http://localhost:3001,http://localhost:3000,https://cartunez.in,https://shop.cartunez.in}
      ADMIN_CORS: ${ADMIN_CORS:-http://localhost:7001,http://localhost:3000,http://localhost:9000,https://cartunez.in,https://shop.cartunez.in}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:9000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - cartunez-network
    deploy:
      resources:
        limits:
          memory: 1G
    logging: *default-logging

  fastapi:
    build:
      context: ./cartunez-api
      dockerfile: Dockerfile
    container_name: cartunez-fastapi
    restart: unless-stopped
    ports:
      - "8005:8000"
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-cartunez}
      REDIS_URL: redis://:${REDIS_PASSWORD:-cartunez_redis_2024}@redis:6379
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change_me}
      API_ADMIN_KEY: ${API_ADMIN_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      CORS_ORIGINS: '["https://cartunez.in","https://shop.cartunez.in","http://localhost:3000","http://localhost:3001","http://localhost:5173"]'
      RATE_LIMIT_PER_MINUTE: 60
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cartunez-network
    deploy:
      resources:
        limits:
          memory: 1G
    logging: *default-logging
